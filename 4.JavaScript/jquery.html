<html>
	
	<head>
		<title>jQuery</title>
	</head>
	
	<body>
		<div>jQueryを読み込む</div>
		
		<div class="text_input_container">
			<div>
				<label for="text_form_1">入力欄①</label>
				<input type="text" id="text_form_1" name="text_form_1" />
			</div>
			
			<div>
				<label for="text_form_2">入力欄②</label>
				<input type="text" id="text_form_2" name="text_form_2" />
			</div>
		</div>
		
		<div class="radio_input_container">
			<input type="radio" id="radio_plus" name="radio_calc_type" value="plus" />
			<label for="radio_plus">+</label>
			<input type="radio" id="radio_minus" name="radio_calc_type" value="minus" />
			<label for="radio_minus">-</label>
			<input type="radio" id="radio_times" name="radio_calc_type" value="times" />
			<label for="radio_times">×</label>
			<input type="radio" id="radio_division" name="radio_calc_type" value="division" />
			<label for="radio_division">÷</label>
		</div>
		
		<button id="submit">送信</button>
		
		<br>
		<!-- 出力するところ -->
		<label for="result">ここに出力されます</label>
		<input type="text" id="result" name="result" />
		
		<script src="https://code.jquery.com/jquery-3.7.1.slim.min.js" integrity="sha256-kmHvs0B+OpCW5GVHUNjv9rOmY0IvSIRcf7zGUDTDQM8=" crossorigin="anonymous"></script>
		<script src="jquery_import_test.js"></script>
	</body>
</html>
