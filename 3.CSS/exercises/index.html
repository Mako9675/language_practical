<!DOCTYPE html>

<html lang="ja">
	
	<head>
		<title>CSS集大成</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale="1.0" />	<!-- 画面のサイズ設定 -->
		<link rel="stylesheet" href="index.css" />
	</head>
	
	<body>
		<div class="layout">
		
			 <!-- ヘッダー -->
			<header class="site-header">
				<button class="header-btn">R</button> 
				<p><b>RPCホーム</b></p>
			</header>
			 <!-- ヘッダーここまで -->
			 
			<!-- サイドバー -->
			<aside class="sidebar"> 
				<div class="side-menu">
					<div class="side-item">
						<a href="#card" class="side-title">カード</a>
					</div>
					<div class="side-item">
						<a href="#form" class="side-title">フォーム</a>
					</div>
					<div class="side-item">
						<a href="#Flexbox" class="side-title">FlexBox</a>
					</div>
					<div class="side-item">
						<a href="#responce" class="side-title">レスポンシブ</a>
					</div>
				</div>
      		</aside>
			<!-- サイドバーここまで -->
			
			<!-- メイン -->
			<main  class="main">
				<h1 id="#top">デザイン</h1>
				<div class="contents">
					<article class="box-design"> <!-- 1つのコンテンツブロック（記事やカード）を表す要素 -->
						<h3 class="ribbon">カード</h3> <!-- 小見出し（カードタイトル）。「ribbon」は装飾クラス -->
						<p>margin / border / padding / shadow / radius / background / typography</p> <!-- カード内の説明文 -->
						<div class="cluster"> <!-- ボタン群を横並びなどで配置するためのグループ要素 -->
							<button class="design-btn">色のあるボタン</button> <!-- 通常のボタン -->
							<button class="design-btn btn--ghost">色のないボタン</button> <!-- 枠線だけのボタン（ゴーストボタン） -->
							<button class="design-btn" disabled>無効ボタン</button> <!-- 押せない（無効化された）ボタン -->
						</div> <!-- cluster終了 -->
					</article> <!-- box終了 -->
				</div>
				
				<div class="contents">
					<article class="box-form"> <!-- 1つのコンテンツブロック（記事やカード）を表す要素 -->
					
					</article> <!-- box終了 -->
				</div>
			</main>
			<!-- メインここまで -->
			
			<!-- フッター -->
			<footer class="site-footer">
				<p>@RPC</p>
				<div class="top-link">
					<a href="#top">ページ上部へ</a>
				</div>
			</footer>
			<!-- フッターここまで -->
			
		</div>
	
	
	</body>

</html>
